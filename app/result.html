<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Love Reading - Luna</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            font-size: 36px;
            background: linear-gradient(90deg, #f8b500, #fceabb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        
        .result-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        
        .zodiac-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .zodiac-symbol {
            font-size: 80px;
            display: block;
            margin-bottom: 10px;
        }
        
        .zodiac-name {
            font-size: 28px;
            color: #f8b500;
        }
        
        .zodiac-element {
            font-size: 14px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }
        
        .reading-section {
            margin: 30px 0;
            padding: 25px;
            background: rgba(248, 181, 0, 0.05);
            border-left: 4px solid #f8b500;
            border-radius: 0 15px 15px 0;
        }
        
        .section-title {
            font-size: 14px;
            color: #f8b500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .reading-text {
            font-size: 18px;
            line-height: 1.8;
            color: #e0e0e0;
        }
        
        .lucky-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .lucky-item {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }
        
        .lucky-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .lucky-label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
        }
        
        .lucky-value {
            font-size: 20px;
            font-weight: bold;
            margin-top: 8px;
        }
        
        .compatibility-box {
            background: rgba(78, 205, 196, 0.1);
            border-left: 4px solid #4ECDC4;
            padding: 25px;
            border-radius: 0 15px 15px 0;
            margin: 30px 0;
        }
        
        .compatibility-score {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(90deg, #4ECDC4, #44A08D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            display: block;
            margin: 20px 0;
        }
        
        .count-info {
            text-align: center;
            padding: 25px;
            background: rgba(248, 181, 0, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(248, 181, 0, 0.3);
            margin-top: 30px;
        }
        
        .count-info span {
            color: #f8b500;
            font-weight: bold;
            font-size: 32px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            color: white;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #f8b500, #fceabb);
            color: #0f0c29;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        @media (max-width: 600px) {
            .lucky-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🌙</div>
            <h1>Your Love Reading</h1>
        </div>
        
        <div id="resultContent">
            <!-- 结果将通过 JavaScript 插入 -->
        </div>
    </div>
    
    <script>
        // 从 URL 参数获取数据
        const urlParams = new URLSearchParams(window.location.search);
        const readingData = JSON.parse(decodeURIComponent(urlParams.get('reading') || '{}'));
        const zodiacData = JSON.parse(decodeURIComponent(urlParams.get('zodiac') || '{}'));
        const remainingCount = parseInt(urlParams.get('count') || '2');
        
        if (!readingData.zodiacSign) {
            // 没有数据，重定向回首页
            window.location.href = 'reading-enhanced.html';
        }
        
        // 生成结果 HTML
        function renderResult() {
            const reading = readingData;
            const zodiac = zodiacData;
            
            let html = `
                <div class="result-card">
                    <div class="zodiac-header">
                        <span class="zodiac-symbol">${zodiac.symbol || '♈'}</span>
                        <div class="zodiac-name">${reading.zodiacSign || 'Aries'}</div>
                        <div class="zodiac-element">${zodiac.element || 'Fire'} Sign • Ruled by ${zodiac.ruler || 'Mars'}</div>
                    </div>
                    
                    <div class="reading-section">
                        <div class="section-title">💕 Cosmic Love Forecast</div>
                        <p class="reading-text">${reading.loveReading || 'The stars have special insights for you today...'}</p>
                    </div>
                    
                    ${reading.compatibility ? `
                        <div class="compatibility-box">
                            <div class="section-title">💖 Compatibility with ${reading.compatibility.partnerName}</div>
                            <span class="compatibility-score">${reading.compatibility.score || 85}%</span>
                            <p class="reading-text" style="text-align: center;">${reading.compatibility.message || 'Your stars show powerful chemistry!'}</p>
                        </div>
                    ` : ''}
                    
                    <div class="reading-section">
                        <div class="section-title">✨ Cosmic Advice</div>
                        <p class="reading-text">${reading.advice || 'Trust your intuition and follow your heart.'}</p>
                    </div>
                    
                    <div class="lucky-grid">
                        <div class="lucky-item">
                            <div class="lucky-icon">🎨</div>
                            <div class="lucky-label">Lucky Color</div>
                            <div class="lucky-value" style="color: ${reading.luckyColor || '#FF6B6B'}">●</div>
                        </div>
                        <div class="lucky-item">
                            <div class="lucky-icon">🔢</div>
                            <div class="lucky-label">Lucky Number</div>
                            <div class="lucky-value">${reading.luckyNumber || 7}</div>
                        </div>
                        <div class="lucky-item">
                            <div class="lucky-icon">💎</div>
                            <div class="lucky-label">Power Crystal</div>
                            <div class="lucky-value">${reading.crystal || 'Rose Quartz'}</div>
                        </div>
                    </div>
                    
                    <div style="text-align: center; margin-top: 30px; color: #a0a0a0; font-size: 14px;">
                        📅 ${reading.date || new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                    </div>
                </div>
                
                <div class="count-info">
                    <p>✨ Free Readings Left: <span>${remainingCount}</span>/2</p>
                    ${remainingCount > 0 ? 
                        '<p style="font-size: 12px; color: #a0a0a0; margin-top: 10px;">Come back when you need more cosmic guidance!</p>' :
                        '<p style="font-size: 12px; color: #a0a0a0; margin-top: 10px;">Unlock unlimited readings for deeper insights!</p>'
                    }
                </div>
                
                ${remainingCount > 0 ? `
                    <a href="reading-enhanced.html" class="btn btn-secondary">🔮 New Reading</a>
                ` : `
                    <a href="paywall.html" class="btn btn-primary">✨ Unlock Unlimited Readings</a>
                `}
                
                <a href="index.html" class="btn btn-secondary">🏠 Home</a>
            `;
            
            document.getElementById('resultContent').innerHTML = html;
        }
        
        renderResult();
    </script>
</body>
</html>
